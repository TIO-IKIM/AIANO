services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: aiano-postgres
    env_file:
      - ./api/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aiano-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  # Backend API
  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: aiano-backend
    env_file:
      - ./api/.env
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
      - ./logs:/app/logs  
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aiano-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}  # Use build arg with default
    container_name: aiano-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - aiano-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  aiano-network:
    driver: bridge
